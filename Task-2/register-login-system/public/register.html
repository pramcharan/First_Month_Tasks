<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header-text">
            <h2>Create Account</h2>
            <p>Let's get you started</p>
        </div>
        <div class="input-group">
            <input type="text" id="fullName" placeholder="Full Name">
        </div>
        <div class="input-group">
            <input type="email" id="email" placeholder="Email">
        </div>
        <div class="input-group">
            <input type="text" id="mobile" placeholder="Mobile Number">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password">
            <button type="button" class="toggle-password" id="toggle-password" onclick="togglePasswordVisibility('password')">Show</button>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="terms">
            <label for="terms">I agree to the <a href="#">Terms & Conditions</a></label>
        </div>
        <div class="checkbox-group" style="margin-bottom: 24px;">
            <input type="checkbox" id="privacy">
            <label for="privacy">I agree to the <a href="#">Privacy Policy</a></label>
        </div>
        <button class="primary-btn" onclick="registerUser()">Sign Up</button>
        <div class="bottom-link">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        function togglePasswordVisibility(id){
            const input = document.getElementById(id);
            const btn = document.getElementById('toggle-' + id);
            if(input.type === 'password'){
                input.type = 'text';
                btn.textContent = 'Hide';
            }else{
                input.type = 'password';
                btn.textContent = 'Show';
            }
        }
    </script>
</body>
</html>
