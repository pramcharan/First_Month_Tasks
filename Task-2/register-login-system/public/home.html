<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="text-align: center;">
        <div class="header-text" style="margin-bottom: 10px;">
            <h2>Welcome Home!</h2>
            <p>Login Successful.</p>
        </div>
        <button class="primary-btn" onclick="logoutUser()" style="margin-top: 24px; margin-bottom: 0;">Logout</button>
    </div>
    <script>
        if(localStorage.getItem("isLoggedIn") !== "true"){
            window.location.href = "login.html";
        }
        function logoutUser(){
            localStorage.removeItem("isLoggedIn");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
