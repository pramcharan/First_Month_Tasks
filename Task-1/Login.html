<!DOCTYPE html>
<html>
<head>
    <title>Login Form</title>
</head>
<body>
    <header>
        <h2>Welcome to the Student Portal Login Page</h2>
    </header>
    <main>
        <section>
            <h2>User Login:</h2>
            <form>
                <label>Email:</label><br>
                <input type="email" id="email" name="email" placeholder="Enter your email" required><br><br>
                <label>Password:</label><br>
                <input type="password" id="password" name="password" placeholder="********" minlength="8" required><br><br>
                <input type="checkbox" id="rememberMe" name="rememberMe">
                <label for="rememberMe">Remember Me</label> <br><br>
                <input type="submit" value="Login">
            </form>
        </section>
    </main>
    <footer>
        <p>IT Spaxious Innovation - Student Portal</p>
    </footer>
</body>
</html>
